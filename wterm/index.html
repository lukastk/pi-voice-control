<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, interactive-widget=resizes-content"
    />
    <title>wterm</title>
    <link rel="stylesheet" href="/terminal.css" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        height: 100dvh;
        overflow: hidden;
        background: #1e1e1e;
        display: flex;
        flex-direction: column;
        overscroll-behavior: none;
      }
      #terminal {
        flex: 1;
        min-height: 0;
        width: 100%;
        border-radius: 0;
        box-shadow: none;
      }
      #extra-keys {
        display: none;
        gap: 4px;
        padding: 6px 4px;
        background: #111;
        border-top: 1px solid #333;
      }
      #extra-keys button {
        flex: 1;
        padding: 10px 0;
        background: #2a2a2a;
        color: #d4d4d4;
        border: 1px solid #444;
        border-radius: 4px;
        font-family: monospace;
        font-size: 12px;
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
        cursor: pointer;
        user-select: none;
      }
      @media (pointer: coarse) {
        #extra-keys {
          display: flex;
        }
      }
      #extra-keys button:active {
        background: #444;
      }
      #extra-keys button.active {
        background: #4a6a8a;
        color: #fff;
      }
    </style>
  </head>
  <body>
    <div id="terminal"></div>
    <div id="extra-keys">
      <button data-key="esc">ESC</button>
      <button data-key="tab">TAB</button>
      <button data-key="ctrl">CTRL</button>
      <button data-key="alt">ALT</button>
      <button data-key="left">&#9664;</button>
      <button data-key="up">&#9650;</button>
      <button data-key="down">&#9660;</button>
      <button data-key="right">&#9654;</button>
      <button data-key="font-down">A&minus;</button>
      <button data-key="font-up">A+</button>
    </div>
    <script type="module" src="/client.js"></script>
  </body>
</html>
